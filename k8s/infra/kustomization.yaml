apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - karpenter
  - keda
  - external-secrets
  - prometheus-stack
  - otel-collector
  - tempo
  - storageclass
  # NOTE: argocd is NOT included here because it is bootstrapped separately
  # via: kubectl apply -k k8s/infra/argocd/
  # ArgoCD should not manage itself to avoid recursive loops
