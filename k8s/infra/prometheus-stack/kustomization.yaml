apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: kube-prometheus-stack is typically installed via Helm
# This kustomization references the values file for documentation
# Deploy with: helm install prometheus prometheus-community/kube-prometheus-stack -f values.yaml

configMapGenerator:
  - name: prometheus-helm-values
    files:
      - values.yaml
