apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: batch-tier
spec:
  template:
    metadata:
      labels:
        node-pool: batch-tier
        workload-type: batch
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: batch-optimized
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
            - arm64
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - m6i
            - m6g
            - m6a
            - c6i
            - c6g
            - c6a
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - xlarge
            - 2xlarge
            - 4xlarge
      taints:
        - key: workload-type
          value: batch
          effect: NoSchedule
  weight: 50
  limits:
    cpu: "300"
    memory: 600Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 10s
    budgets:
      - nodes: "50%"
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: batch-optimized
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        iops: 3000
        throughput: 250
        encrypted: true
        deleteOnTermination: true
  role: KarpenterNodeRole-${CLUSTER_NAME}
  subnetSelectorTerms:
    - tags:
        Tier: private
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  tags:
    Environment: production
    ManagedBy: karpenter
    WorkloadType: batch
  userData: |
    #!/bin/bash
    echo "Batch node configuration"
