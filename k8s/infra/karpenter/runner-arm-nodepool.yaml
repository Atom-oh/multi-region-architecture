apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: runner-arm
spec:
  template:
    metadata:
      labels:
        node-pool: runner-arm
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: runner-arm
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - c6g
            - c7g
            - m6g
            - m7g
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - xlarge
            - 2xlarge
            - 4xlarge
      taints:
        - key: workload-type
          value: ci-runner
          effect: NoSchedule
  limits:
    cpu: "128"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
