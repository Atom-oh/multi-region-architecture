          serviceAccountName: runner-scheduler
          restartPolicy: OnFailure
          tolerations:
            - key: workload-type
              value: platform
              effect: NoSchedule
          nodeSelector:
            node-pool: platform
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.35
              command:
                - /bin/sh
