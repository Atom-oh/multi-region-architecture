apiVersion: batch/v1
kind: CronJob
metadata:
  name: runner-scale-up
  namespace: actions-runner-system
spec:
  schedule: "0 8 * * 1-5"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          serviceAccountName: runner-scheduler
          restartPolicy: OnFailure
          tolerations:
            - key: workload-type
              value: platform
              effect: NoSchedule
          nodeSelector:
            node-pool: platform
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.35
              command:
                - /bin/sh
                - -c
                - |
                  for runner in atom-x86 atom-arm atom-claude; do
                    kubectl patch autoscalingrunnerset "$runner" \
                      -n actions-runner-system \
                      --type merge \
                      -p '{"spec":{"minRunners":2}}'
                    echo "Scaled up $runner to minRunners=2"
                  done
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: runner-scale-down
  namespace: actions-runner-system
spec:
  schedule: "0 22 * * 1-5"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
