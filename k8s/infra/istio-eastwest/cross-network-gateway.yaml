# Cross-network Gateway: terminates the AUTO_PASSTHROUGH TLS connections that
# arrive on the eastwestgateway's HBONE port (15008) and routes them by SNI to
# the right local ztunnel/workload — this is what lets the peer cluster's
# traffic land on the correct service once it reaches this cluster.
# Identical in az-a and az-c: it only selects the *local* eastwestgateway pods,
# no per-cluster values needed.
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: cross-network-gateway
  namespace: istio-system
spec:
  selector:
    istio: eastwestgateway
  servers:
    - port:
        number: 15008
        name: tls
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "*.local"
