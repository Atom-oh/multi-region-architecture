apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: storageclass
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
    - clusters:
        selector:
          matchLabels:
            region: us-west-2
  template:
    metadata:
      name: 'storageclass-{{name}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:<GITHUB_ORG>/multi-region-architecture.git
        targetRevision: main
        path: k8s/infra/storageclass
      destination:
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
