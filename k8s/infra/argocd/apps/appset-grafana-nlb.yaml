apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana-nlb
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
  template:
    metadata:
      name: 'grafana-nlb-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:Atom-oh/multi-region-architecture.git
        targetRevision: main
        path: k8s/infra/grafana
        kustomize:
          patches:
            - target:
                kind: Service
                name: grafana-nlb
              patch: |-
                - op: add
                  path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-security-groups
                  value: "sg-0dddefc502b0f7369"
                - op: add
                  path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-ssl-cert
                  value: "arn:aws:acm:us-east-1:180294183052:certificate/f6b6907a-5747-4039-967a-a8c7c73116a7"
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
