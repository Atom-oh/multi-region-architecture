apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-otel-collector
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: region
              operator: Exists
  template:
    metadata:
      name: 'otel-collector-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        chart: opentelemetry-collector
        repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
        targetRevision: 0.115.0
        helm:
          valuesObject:
            fullnameOverride: otel-collector
            image:
              repository: otel/opentelemetry-collector-contrib
            mode: daemonset
            service:
              enabled: true
            tolerations:
              - operator: Exists
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            serviceAccount:
              annotations:
                eks.amazonaws.com/role-arn: 'arn:aws:iam::180294183052:role/production-otel-collector-{{metadata.labels.region}}'
            presets:
              kubernetesAttributes:
                enabled: true
            config:
              receivers:
                otlp:
                  protocols:
                    grpc:
                      endpoint: 0.0.0.0:4317
                    http:
                      endpoint: 0.0.0.0:4318
              processors:
                batch:
                  send_batch_size: 1024
                  timeout: 5s
              exporters:
                otlp/tempo:
                  endpoint: tempo.observability.svc.cluster.local:4317
                  tls:
                    insecure: true
                awsxray:
                  region: '{{metadata.labels.region}}'
                prometheus:
                  endpoint: 0.0.0.0:8889
                  namespace: otel
                  resource_to_telemetry_conversion:
                    enabled: true
              service:
                pipelines:
                  traces:
                    receivers: [otlp]
                    processors: [batch]
                    exporters: [otlp/tempo, awsxray]
                  metrics:
                    receivers: [otlp]
                    processors: [batch]
                    exporters: [prometheus]
      destination:
        server: '{{server}}'
        namespace: platform
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
