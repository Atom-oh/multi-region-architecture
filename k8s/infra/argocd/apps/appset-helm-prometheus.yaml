apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-prometheus-stack
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
  template:
    metadata:
      name: 'prometheus-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 68.4.0
        helm:
          valuesObject:
            grafana:
              enabled: true
              replicas: 1
              persistence:
                enabled: true
                size: 10Gi
                storageClassName: gp3
              plugins:
                - grafana-clickhouse-datasource
              sidecar:
                datasources:
                  defaultDatasourceEnabled: false
                dashboards:
                  enabled: true
                  label: grafana_dashboard
                  labelValue: "1"
                  searchNamespace: ALL
                  folderAnnotation: grafana_folder
                  annotations:
                    grafana_folder: "Default"
              grafana.ini:
                server:
                  root_url: https://grafana.atomai.click
                  serve_from_sub_path: false
              datasources:
                datasources.yaml:
                  apiVersion: 1
                  deleteDatasources:
                    - name: Prometheus
                      orgId: 1
                    - name: Tempo
                      orgId: 1
                  datasources:
                    - name: Prometheus (us-east-1)
                      type: prometheus
                      uid: prometheus-east
                      url: http://prometheus-us-east-1-kube-prometheus.monitoring:9090
                      access: proxy
                      isDefault: true
                      jsonData:
                        exemplarTraceIdDestinations:
                          - name: traceID
                            datasourceUid: clickhouse
                    - name: Prometheus (us-west-2)
                      type: prometheus
                      uid: prometheus-west
                      url: http://prometheus-west.internal.atomai.click:9090
                      access: proxy
                      jsonData:
                        exemplarTraceIdDestinations:
                          - name: traceID
                            datasourceUid: clickhouse
                    - name: Tempo (us-east-1)
                      type: tempo
                      uid: tempo
                      url: http://tempo.observability:3200
                      access: proxy
                      jsonData:
                        tracesToMetrics:
                          datasourceUid: prometheus-east
                        tracesToLogs:
                          datasourceUid: clickhouse
                          filterByTraceID: true
                          filterBySpanID: true
                        serviceMap:
                          datasourceUid: prometheus-east
                        nodeGraph:
                          enabled: true
                    - name: Tempo (us-west-2)
                      type: tempo
                      uid: tempo-west
                      url: http://tempo-west.internal.atomai.click:3200
                      access: proxy
                      jsonData:
                        tracesToMetrics:
                          datasourceUid: prometheus-west
                        tracesToLogs:
                          datasourceUid: clickhouse
                          filterByTraceID: true
                          filterBySpanID: true
                        serviceMap:
                          datasourceUid: prometheus-west
                        nodeGraph:
                          enabled: true
                    - name: CloudWatch (us-east-1)
                      type: cloudwatch
                      uid: cloudwatch-east
                      jsonData:
                        defaultRegion: us-east-1
                    - name: CloudWatch (us-west-2)
                      type: cloudwatch
                      uid: cloudwatch-west
                      jsonData:
                        defaultRegion: us-west-2
                    - name: Prometheus (apne2-az-a)
                      type: prometheus
                      uid: prometheus-korea-az-a
                      url: http://prometheus-korea-az-a.internal.atomai.click:9090
                      access: proxy
                      jsonData:
                        exemplarTraceIdDestinations:
                          - name: traceID
                            datasourceUid: clickhouse
                    - name: Prometheus (apne2-az-c)
                      type: prometheus
                      uid: prometheus-korea-az-c
                      url: http://prometheus-korea-az-c.internal.atomai.click:9090
                      access: proxy
                      jsonData:
                        exemplarTraceIdDestinations:
                          - name: traceID
                            datasourceUid: clickhouse
                    - name: Tempo (apne2-az-a)
                      type: tempo
                      uid: tempo-korea-az-a
                      url: http://tempo-korea-az-a.internal.atomai.click:3200
                      access: proxy
                      jsonData:
                        tracesToMetrics:
                          datasourceUid: prometheus-korea-az-a
                        tracesToLogs:
                          datasourceUid: clickhouse
                          filterByTraceID: true
                          filterBySpanID: true
                        serviceMap:
                          datasourceUid: prometheus-korea-az-a
                        nodeGraph:
                          enabled: true
                    - name: Tempo (apne2-az-c)
                      type: tempo
                      uid: tempo-korea-az-c
                      url: http://tempo-korea-az-c.internal.atomai.click:3200
                      access: proxy
                      jsonData:
                        tracesToMetrics:
                          datasourceUid: prometheus-korea-az-c
                        tracesToLogs:
                          datasourceUid: clickhouse
                          filterByTraceID: true
                          filterBySpanID: true
                        serviceMap:
                          datasourceUid: prometheus-korea-az-c
                        nodeGraph:
                          enabled: true
                    - name: CloudWatch (ap-northeast-2)
                      type: cloudwatch
                      uid: cloudwatch-korea
                      jsonData:
                        defaultRegion: ap-northeast-2
                    - name: ClickHouse
                      type: grafana-clickhouse-datasource
                      uid: clickhouse
                      url: http://clickhouse-clickhouse.observability:8123
                      access: proxy
                      jsonData:
                        defaultDatabase: otel
                        protocol: http
            prometheus:
              prometheusSpec:
                replicas: 2
                retention: 15d
                enableFeatures:
                  - exemplar-storage
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      storageClassName: gp3
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 50Gi
                serviceMonitorSelectorNilUsesHelmValues: false
                podMonitorSelectorNilUsesHelmValues: false
            alertmanager:
              alertmanagerSpec:
                replicas: 2
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
