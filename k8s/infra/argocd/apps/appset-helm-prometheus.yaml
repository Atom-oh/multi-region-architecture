apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-prometheus-stack
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
  template:
    metadata:
      name: 'prometheus-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 68.4.0
        helm:
          valuesObject:
            grafana:
              enabled: true
              replicas: 1
              persistence:
                enabled: true
                size: 10Gi
                storageClassName: gp3
              grafana.ini:
                server:
                  root_url: https://grafana.atomai.click
                  serve_from_sub_path: false
              datasources:
                datasources.yaml:
                  apiVersion: 1
                  deleteDatasources:
                    - name: Prometheus
                      orgId: 1
                  datasources:
                    - name: Prometheus (local)
                      type: prometheus
                      url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
                      access: proxy
                      isDefault: true
                    - name: Tempo
                      type: tempo
                      url: http://tempo.observability:3200
                      access: proxy
                      jsonData:
                        nodeGraph:
                          enabled: true
                    - name: CloudWatch (us-east-1)
                      type: cloudwatch
                      uid: cloudwatch-east
                      jsonData:
                        defaultRegion: us-east-1
                    - name: CloudWatch (us-west-2)
                      type: cloudwatch
                      uid: cloudwatch-west
                      jsonData:
                        defaultRegion: us-west-2
            prometheus:
              prometheusSpec:
                replicas: 2
                retention: 15d
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      storageClassName: gp3
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 50Gi
                serviceMonitorSelectorNilUsesHelmValues: false
                podMonitorSelectorNilUsesHelmValues: false
            alertmanager:
              alertmanagerSpec:
                replicas: 2
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
