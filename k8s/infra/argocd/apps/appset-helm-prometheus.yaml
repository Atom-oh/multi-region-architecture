apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-prometheus-stack
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: region
              operator: Exists
  template:
    metadata:
      name: 'prometheus-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 68.4.0
        helm:
          valuesObject:
            grafana:
              enabled: true
              replicas: 2
              persistence:
                enabled: true
                size: 10Gi
              datasources:
                datasources.yaml:
                  apiVersion: 1
                  datasources:
                    - name: Tempo
                      type: tempo
                      url: http://tempo.observability:3100
                      access: proxy
                    - name: CloudWatch
                      type: cloudwatch
                      jsonData:
                        defaultRegion: '{{metadata.labels.region}}'
            prometheus:
              prometheusSpec:
                replicas: 2
                retention: 15d
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 50Gi
                serviceMonitorSelectorNilUsesHelmValues: false
                podMonitorSelectorNilUsesHelmValues: false
            alertmanager:
              alertmanagerSpec:
                replicas: 2
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
