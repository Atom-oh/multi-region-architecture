apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-prometheus-stack
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
        values:
          grafana_enabled: "true"
          grafana_replicas: "2"
    - clusters:
        selector:
          matchLabels:
            region: us-west-2
        values:
          grafana_enabled: "false"
          grafana_replicas: "0"
  template:
    metadata:
      name: 'prometheus-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 68.4.0
        helm:
          valuesObject:
            grafana:
              enabled: '{{values.grafana_enabled}}'
              replicas: '{{values.grafana_replicas}}'
              persistence:
                enabled: true
                size: 10Gi
                storageClassName: gp3
              grafana.ini:
                server:
                  root_url: https://grafana.atomai.click
                  serve_from_sub_path: false
              datasources:
                datasources.yaml:
                  apiVersion: 1
                  datasources:
                    - name: Prometheus (local)
                      type: prometheus
                      url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
                      access: proxy
                      isDefault: true
                    - name: Tempo
                      type: tempo
                      url: http://tempo.observability:3200
                      access: proxy
                      jsonData:
                        tracesToLogsV2:
                          datasourceUid: cloudwatch
                          filterByTraceID: true
                        serviceMap:
                          datasourceUid: prometheus-local
                        nodeGraph:
                          enabled: true
                    - name: CloudWatch (us-east-1)
                      type: cloudwatch
                      uid: cloudwatch
                      jsonData:
                        defaultRegion: us-east-1
                    - name: CloudWatch (us-west-2)
                      type: cloudwatch
                      jsonData:
                        defaultRegion: us-west-2
            prometheus:
              prometheusSpec:
                replicas: 2
                retention: 15d
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      storageClassName: gp3
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 50Gi
                serviceMonitorSelectorNilUsesHelmValues: false
                podMonitorSelectorNilUsesHelmValues: false
            alertmanager:
              alertmanagerSpec:
                replicas: 2
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
