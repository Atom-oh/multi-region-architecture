apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tempo
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
        values:
          awsRegion: us-east-1
          tempoRoleArn: "arn:aws:iam::<AWS_ACCOUNT_ID>:role/production-tempo-us-east-1"
          tempoS3Bucket: "production-mall-tempo-traces-us-east-1"
    - clusters:
        selector:
          matchLabels:
            region: us-west-2
        values:
          awsRegion: us-west-2
          tempoRoleArn: "arn:aws:iam::<AWS_ACCOUNT_ID>:role/production-tempo-us-west-2"
          tempoS3Bucket: "production-mall-tempo-traces-us-west-2"
  template:
    metadata:
      name: 'infra-tempo-{{name}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:Atom-oh/multi-region-architecture.git
        targetRevision: main
        path: k8s/infra/tempo
        kustomize:
          patches:
            - target:
                kind: ServiceAccount
                name: tempo
              patch: |-
                - op: replace
                  path: /metadata/annotations/eks.amazonaws.com~1role-arn
                  value: "{{values.tempoRoleArn}}"
            - target:
                kind: Deployment
                name: tempo
              patch: |-
                - op: replace
                  path: /spec/template/spec/containers/0/env
                  value:
                    - name: AWS_REGION
                      value: "{{values.awsRegion}}"
                    - name: TEMPO_S3_BUCKET
                      value: "{{values.tempoS3Bucket}}"
      destination:
        server: '{{server}}'
        namespace: observability
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
