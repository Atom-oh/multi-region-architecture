apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-alb-controller
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
        values:
          roleArn: "arn:aws:iam::180294183052:role/multi-region-mall-alb-controller"
          vpcId: vpc-0123456789abcdef0
          awsRegion: us-east-1
          clusterName: multi-region-mall
    - clusters:
        selector:
          matchLabels:
            region: us-west-2
        values:
          roleArn: "arn:aws:iam::180294183052:role/multi-region-mall-alb-controller-us-west-2"
          vpcId: vpc-0abcdef1234567890
          awsRegion: us-west-2
          clusterName: multi-region-mall
  template:
    metadata:
      name: 'alb-controller-{{name}}'
    spec:
      project: default
      source:
        chart: aws-load-balancer-controller
        repoURL: https://aws.github.io/eks-charts
        targetRevision: 3.1.0
        helm:
          valuesObject:
            clusterName: '{{values.clusterName}}'
            region: '{{values.awsRegion}}'
            vpcId: '{{values.vpcId}}'
            serviceAccount:
              create: true
              name: aws-load-balancer-controller
              annotations:
                eks.amazonaws.com/role-arn: '{{values.roleArn}}'
      destination:
        server: '{{server}}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
