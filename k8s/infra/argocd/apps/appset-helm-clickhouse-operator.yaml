apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-clickhouse-operator
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            region: us-east-1
    - clusters:
        selector:
          matchLabels:
            region: us-west-2
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-a
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-c
  template:
    metadata:
      name: 'clickhouse-operator-{{name}}'
    spec:
      project: default
      source:
        chart: altinity-clickhouse-operator
        repoURL: https://altinity.github.io/clickhouse-operator
        targetRevision: 0.24.1
        helm:
          valuesObject:
            fullnameOverride: clickhouse-operator
            operator:
              env:
                - name: WATCH_NAMESPACES
                  value: "observability,clickhouse-operator-system"
      destination:
        server: '{{server}}'
        namespace: clickhouse-operator-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
