apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-fluent-bit
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: region
              operator: Exists
  template:
    metadata:
      name: 'fluent-bit-{{metadata.labels.region}}'
    spec:
      project: default
      source:
        chart: fluent-bit
        repoURL: https://fluent.github.io/helm-charts
        targetRevision: 0.49.0
        helm:
          valuesObject:
            config:
              outputs: |
                [OUTPUT]
                    Name              cloudwatch_logs
                    Match             *
                    region            {{metadata.labels.region}}
                    log_group_name    /eks/multi-region-mall
                    log_stream_prefix fluentbit-
                    auto_create_group true
            tolerations:
              - operator: Exists
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
      destination:
        server: '{{server}}'
        namespace: logging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
