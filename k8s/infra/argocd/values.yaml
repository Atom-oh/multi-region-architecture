global:
  domain: argocd.atomai.click

server:
  replicas: 3
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

controller:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "3"
      memory: 2Gi
  args:
    - --status-processors
    - "10"
    - --operation-processors
    - "5"
    - --repo-server-timeout-seconds
    - "90"

repoServer:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

applicationSet:
  replicas: 2

redis-ha:
  enabled: true

configs:
  cm:
    kustomize.buildOptions: "--enable-helm"
    resource.exclusions: |
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
        clusters:
          - "*"
  params:
    server.insecure: true
    controller.self.heal.timeout.seconds: "10"
