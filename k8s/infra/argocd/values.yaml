global:
  domain: argocd.atomai.click

server:
  replicas: 3
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

controller:
  replicas: 3

repoServer:
  replicas: 3

applicationSet:
  replicas: 2

redis-ha:
  enabled: true

configs:
  cm:
    kustomize.buildOptions: "--enable-helm"
    resource.exclusions: |
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
        clusters:
          - "*"
  params:
    server.insecure: true
