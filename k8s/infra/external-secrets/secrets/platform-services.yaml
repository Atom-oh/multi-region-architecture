  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: analytics-secrets
    creationPolicy: Owner
  data:
    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: mall/shared/msk
