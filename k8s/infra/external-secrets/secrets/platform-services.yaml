apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: api-gateway-secrets
    creationPolicy: Owner
  data:
    - secretKey: VALKEY_HOST
      remoteRef:
        key: mall/shared/valkey
        property: host
    - secretKey: VALKEY_PORT
      remoteRef:
        key: mall/shared/valkey
        property: port
    - secretKey: VALKEY_AUTH_TOKEN
      remoteRef:
        key: mall/shared/valkey
        property: auth_token
    - secretKey: JWT_SECRET
      remoteRef:
        key: mall/user/auth
        property: jwt_secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: event-bus-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: event-bus-secrets
    creationPolicy: Owner
  data:
    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: mall/shared/msk
        property: brokers
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef:
        key: mall/shared/msk
        property: sasl_username
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef:
        key: mall/shared/msk
        property: sasl_password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
