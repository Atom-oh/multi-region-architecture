apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pricing-secrets
  namespace: business-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: pricing-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: mall/business/aurora
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: mall/business/aurora
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: mall/business/aurora
        property: database
    - secretKey: DB_USER
      remoteRef:
        key: mall/business/aurora
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mall/business/aurora
        property: password
    - secretKey: VALKEY_HOST
      remoteRef:
        key: mall/shared/valkey
        property: host
    - secretKey: VALKEY_AUTH_TOKEN
      remoteRef:
        key: mall/shared/valkey
        property: auth_token
---
