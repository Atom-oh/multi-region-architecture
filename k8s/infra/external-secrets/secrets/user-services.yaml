apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: user-account-secrets
  namespace: user-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: user-account-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: mall/user/aurora
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: mall/user/aurora
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: mall/user/aurora
        property: database
    - secretKey: DB_USER
      remoteRef:
        key: mall/user/aurora
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mall/user/aurora
        property: password
    - secretKey: VALKEY_HOST
      remoteRef:
        key: mall/shared/valkey
        property: host
    - secretKey: VALKEY_AUTH_TOKEN
      remoteRef:
        key: mall/shared/valkey
        property: auth_token
    - secretKey: JWT_SECRET
      remoteRef:
        key: mall/user/auth
        property: jwt_secret
    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: mall/shared/msk
        property: brokers
---
