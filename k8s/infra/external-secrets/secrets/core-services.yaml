apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: product-catalog-secrets
  namespace: core-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: product-catalog-secrets
    creationPolicy: Owner
  data:
    - secretKey: DOCUMENTDB_PASSWORD
      remoteRef:
        key: mall/core/documentdb
        property: password
    - secretKey: DOCUMENTDB_HOST
      remoteRef:
        key: mall/core/documentdb
        property: host
    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: mall/shared/msk
        property: brokers
---
