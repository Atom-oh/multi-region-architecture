apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: msk-shared-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: msk-shared-secrets
    creationPolicy: Owner
  data:
    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: mall/shared/msk
        property: brokers
    - secretKey: KAFKA_SECURITY_PROTOCOL
      remoteRef:
        key: mall/shared/msk
        property: security_protocol
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: valkey-shared-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: valkey-shared-secrets
    creationPolicy: Owner
  data:
    - secretKey: VALKEY_HOST
      remoteRef:
        key: mall/shared/valkey
        property: host
    - secretKey: VALKEY_PORT
      remoteRef:
        key: mall/shared/valkey
        property: port
    - secretKey: VALKEY_AUTH_TOKEN
