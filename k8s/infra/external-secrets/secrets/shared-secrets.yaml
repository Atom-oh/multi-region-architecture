        key: mall/shared/valkey
        property: auth_token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: otel-secrets
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: otel-secrets
    creationPolicy: Owner
  data:
    - secretKey: TEMPO_S3_BUCKET
      remoteRef:
        key: mall/observability/tempo
        property: s3_bucket
    - secretKey: TEMPO_S3_REGION
      remoteRef:
        key: mall/observability/tempo
        property: s3_region
