global:
  domain: argocd-kr.atomai.click
  tolerations:
    - key: node-role
      value: system-critical
      effect: NoSchedule
  nodeSelector:
    role: system

server:
  replicas: 2
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

controller:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "3"
      memory: 2Gi
  args:
    - --status-processors
    - "10"
    - --operation-processors
    - "5"
    - --repo-server-timeout-seconds
    - "90"

repoServer:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

applicationSet:
  replicas: 2

redis-ha:
  enabled: true
  tolerations:
    - key: node-role
      value: system-critical
      effect: NoSchedule
  nodeSelector:
    role: system
  haproxy:
    tolerations:
      - key: node-role
        value: system-critical
        effect: NoSchedule
    nodeSelector:
      role: system

configs:
  cm:
    kustomize.buildOptions: "--enable-helm"
    resource.exclusions: |
      - apiGroups:
          - cilium.io
        kinds:
          - CiliumIdentity
        clusters:
          - "*"
  params:
    server.insecure: true
    controller.self.heal.timeout.seconds: "10"
