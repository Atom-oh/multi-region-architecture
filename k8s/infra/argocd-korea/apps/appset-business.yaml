apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: business-services
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-a
        values:
          overlayPath: ap-northeast-2-az-a
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-c
        values:
          overlayPath: ap-northeast-2-az-c
  template:
    metadata:
      name: 'business-{{name}}'
    spec:
      project: default
      source:
        repoURL: git@github.com:Atom-oh/multi-region-architecture.git
        targetRevision: main
        path: 'k8s/overlays/{{values.overlayPath}}/business'
        kustomize:
          images:
            - '<AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/seller={{metadata.annotations.ecr-registry}}/shopping-mall/seller'
            - '<AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/notification={{metadata.annotations.ecr-registry}}/shopping-mall/notification'
            - '<AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/recommendation={{metadata.annotations.ecr-registry}}/shopping-mall/recommendation'
            - '<AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/pricing={{metadata.annotations.ecr-registry}}/shopping-mall/pricing'
      destination:
        server: '{{server}}'
        namespace: business-services
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
