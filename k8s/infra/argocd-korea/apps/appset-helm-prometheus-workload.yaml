apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-prometheus-stack-workload
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-a
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-c
  template:
    metadata:
      name: 'prometheus-{{name}}'
    spec:
      project: default
      source:
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 68.4.0
        helm:
          valuesObject:
            grafana:
              enabled: false
            prometheus:
              prometheusSpec:
                replicas: 1
                retention: 2d
                enableFeatures:
                  - exemplar-storage
                remoteWrite:
                  # kubectl get svc prometheus-nlb -n monitoring → EXTERNAL-IP
                  - url: "http://PROMETHEUS_NLB_DNS:9090/api/v1/write"
                    queueConfig:
                      maxSamplesPerSend: 5000
                      batchSendDeadline: 30s
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      storageClassName: gp3
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 10Gi
                serviceMonitorSelectorNilUsesHelmValues: false
                podMonitorSelectorNilUsesHelmValues: false
            alertmanager:
              enabled: false
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
