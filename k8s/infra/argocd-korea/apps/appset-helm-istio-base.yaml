apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-istio-base
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-a
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-c
  # mgmt cluster is intentionally excluded — it runs observability/ArgoCD/runners
  # only and does not participate in the ambient mesh or zone failover.
  template:
    metadata:
      name: 'istio-base-{{name}}'
    spec:
      project: default
      source:
        chart: base
        repoURL: https://istio-release.storage.googleapis.com/charts
        targetRevision: 1.30.1
        helm:
          valuesObject:
            defaultRevision: default
      destination:
        server: '{{server}}'
        namespace: istio-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
