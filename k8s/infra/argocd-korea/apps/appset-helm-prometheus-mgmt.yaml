apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-prometheus-stack-mgmt
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-mgmt
  template:
    metadata:
      name: 'prometheus-{{name}}'
    spec:
      project: default
      source:
        chart: kube-prometheus-stack
        repoURL: https://prometheus-community.github.io/helm-charts
        targetRevision: 68.4.0
        helm:
          valuesObject:
            grafana:
              enabled: true
              replicas: 1
              persistence:
                enabled: true
                size: 10Gi
                storageClassName: gp3
              plugins:
                - grafana-clickhouse-datasource
              grafana.ini:
                server:
                  root_url: "https://grafana-kr.atomai.click"
              sidecar:
                dashboards:
                  enabled: true
                  searchNamespace: ALL
                  label: grafana_dashboard
                  folderAnnotation: grafana_folder
              additionalDataSources:
                - name: ClickHouse
                  type: grafana-clickhouse-datasource
                  url: http://clickhouse-clickhouse.observability:8123
                  access: proxy
                  jsonData:
                    defaultDatabase: otel
                - name: Tempo
                  type: tempo
                  url: http://tempo.observability:3200
                  access: proxy
                  jsonData:
                    tracesToLogsV2:
                      datasourceUid: ClickHouse
                      filterByTraceID: true
                      filterBySpanID: true
                    tracesToMetrics:
                      datasourceUid: prometheus
                      queries:
                        - name: Request rate
                          query: "sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))"
                    serviceMap:
                      datasourceUid: prometheus
            prometheus:
              prometheusSpec:
                replicas: 2
                retention: 15d
                enableFeatures:
                  - exemplar-storage
                  - remote-write-receiver
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      storageClassName: gp3
                      accessModes: ["ReadWriteOnce"]
                      resources:
                        requests:
                          storage: 100Gi
                serviceMonitorSelectorNilUsesHelmValues: false
                podMonitorSelectorNilUsesHelmValues: false
                exemplars:
                  maxSize: 100000
            alertmanager:
              alertmanagerSpec:
                replicas: 2
      destination:
        server: '{{server}}'
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
