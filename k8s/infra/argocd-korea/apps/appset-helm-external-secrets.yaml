apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-external-secrets
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-a
        values:
          awsRegion: ap-northeast-2
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-az-c
        values:
          awsRegion: ap-northeast-2
  template:
    metadata:
      name: 'external-secrets-{{name}}'
    spec:
      project: default
      source:
        chart: external-secrets
        repoURL: https://charts.external-secrets.io
        targetRevision: 0.14.0
        helm:
          valuesObject:
            serviceAccount:
              name: external-secrets
            tolerations:
              - key: node-role
                value: system-critical
                effect: NoSchedule
            nodeSelector:
              role: system
      destination:
        server: '{{server}}'
        namespace: external-secrets
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
