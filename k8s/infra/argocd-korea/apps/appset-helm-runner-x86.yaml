apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-runner-x86
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-name: mall-apne2-mgmt
  template:
    metadata:
      name: 'runner-x86-{{name}}'
    spec:
      project: default
      source:
        chart: gha-runner-scale-set
        repoURL: ghcr.io/actions/actions-runner-controller-charts
        targetRevision: 0.10.1
        helm:
          valuesObject:
            githubConfigUrl: https://github.com/Atom-oh/multi-region-architecture
            githubConfigSecret: github-app-secret
            controllerServiceAccount:
              name: arc-controller-mall-apne2-mgmt-gha-rs-controller
              namespace: actions-runner-system
            runnerScaleSetName: self-hosted-x86
            minRunners: 0
            maxRunners: 10
            listenerTemplate:
              spec:
                containers:
                  - name: listener
                tolerations:
                  - key: node-role
                    value: system-critical
                    effect: NoSchedule
                nodeSelector:
                  role: system
            template:
              spec:
                nodeSelector:
                  kubernetes.io/arch: amd64
                tolerations:
                  - key: node-role
                    value: system-critical
                    effect: NoSchedule
                containers:
                  - name: runner
                    image: ghcr.io/actions/actions-runner:latest
                    command: ["/home/runner/run.sh"]
                    resources:
                      requests:
                        cpu: "1"
                        memory: 2Gi
                      limits:
                        cpu: "4"
                        memory: 8Gi
      destination:
        server: '{{server}}'
        namespace: actions-runner-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
