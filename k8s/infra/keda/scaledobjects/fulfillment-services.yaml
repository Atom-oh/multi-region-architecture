apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: shipping-scaler
  namespace: fulfillment
spec:
  scaleTargetRef:
    name: shipping
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BROKERS}
        consumerGroup: shipping-service
        topic: orders
        lagThreshold: "100"
      authenticationRef:
        name: keda-aws-msk
        kind: ClusterTriggerAuthentication
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
---
