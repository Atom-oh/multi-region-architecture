apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-scaler
  namespace: core-services
spec:
  scaleTargetRef:
    name: order
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 20
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: ${MSK_BROKERS}
        consumerGroup: order-service
        topic: orders
        lagThreshold: "100"
      authenticationRef:
        name: keda-aws-msk
        kind: ClusterTriggerAuthentication
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    - type: memory
      metricType: Utilization
      metadata:
        value: "80"
---
