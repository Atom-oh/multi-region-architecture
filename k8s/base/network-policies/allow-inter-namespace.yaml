# Allow core-services to reach business-services (pricing lookups)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-core-services
  namespace: business-services
spec:
  podSelector:
    matchLabels:
      app: pricing
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: core-services
      ports:
        - protocol: TCP
          port: 8080
---
# Allow core-services to reach user-services (user lookups)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-core-services
  namespace: user-services
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: core-services
      ports:
        - protocol: TCP
          port: 8080
---
# Allow egress from platform to all namespaces
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-services
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: shopping-mall
      ports:
        - protocol: TCP
          port: 8080
---
# Allow egress from core-services to business-services and user-services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-dependencies
  namespace: core-services
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: business-services
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: user-services
      ports:
        - protocol: TCP
          port: 8080
---
