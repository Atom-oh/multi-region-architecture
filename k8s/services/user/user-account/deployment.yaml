apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-account
  namespace: user-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::180294183052:role/placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-account
  namespace: user-services
  labels:
    app: user-account
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-account
  template:
    metadata:
      labels:
        app: user-account
        version: v1
    spec:
      serviceAccountName: user-account
      nodeSelector:
        node-pool: critical
      tolerations:
        - key: node-pool
          value: critical
          effect: NoSchedule
      containers:
        - name: user-account
          image: 180294183052.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/user-account:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: REGION_ROLE
              value: PRIMARY
            # DB_HOST: Aurora PostgreSQL endpoint via ExternalSecret
            # CACHE_HOST: Valkey endpoint via ExternalSecret (session storage)
            # KAFKA_BROKERS: MSK bootstrap via ExternalSecret
          envFrom:
            - secretRef:
                name: user-account-secrets
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: user-account
---
apiVersion: v1
kind: Service
metadata:
  name: user-account
  namespace: user-services
spec:
  selector:
    app: user-account
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-account
  namespace: user-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-account
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
