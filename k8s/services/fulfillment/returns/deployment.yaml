apiVersion: v1
kind: ServiceAccount
metadata:
  name: returns
  namespace: fulfillment
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::180294183052:role/placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: returns
  namespace: fulfillment
  labels:
    app: returns
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: returns
  template:
    metadata:
      labels:
        app: returns
        version: v1
    spec:
      serviceAccountName: returns
      containers:
        - name: returns
          image: 180294183052.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/returns:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: REGION_ROLE
              value: PRIMARY
            # DB_HOST: Aurora PostgreSQL endpoint via ExternalSecret
            # KAFKA_BROKERS: MSK bootstrap via ExternalSecret
          envFrom:
            - secretRef:
                name: returns-secrets
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: returns
---
apiVersion: v1
kind: Service
metadata:
  name: returns
  namespace: fulfillment
spec:
  selector:
    app: returns
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: returns
  namespace: fulfillment
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: returns
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
