apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart
  namespace: core-services
  annotations:
    eks.amazonaws.com/role-arn: ${IRSA_ROLE_ARN}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: core-services
  labels:
    app: cart
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
        version: v1
    spec:
      serviceAccountName: cart
      containers:
        - name: cart
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cart:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: REGION_ROLE
              value: ${REGION_ROLE}
            # CACHE_HOST: Valkey endpoint via ExternalSecret (primary storage)
            # KAFKA_BROKERS: MSK bootstrap via ExternalSecret
          envFrom:
            - secretRef:
                name: cart-secrets
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: cart
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: core-services
spec:
  selector:
    app: cart
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart
  namespace: core-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
