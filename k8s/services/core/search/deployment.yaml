apiVersion: v1
kind: ServiceAccount
metadata:
  name: search
  namespace: core-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::180294183052:role/placeholder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: core-services
  labels:
    app: search
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        version: v1
    spec:
      serviceAccountName: search
      containers:
        - name: search
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: REGION_ROLE
              value: PRIMARY
            # DB_HOST: OpenSearch endpoint via ExternalSecret
            # CACHE_HOST: Valkey endpoint via ExternalSecret (TTL: 5m)
            # KAFKA_BROKERS: MSK bootstrap via ExternalSecret
          envFrom:
            - secretRef:
                name: search-secrets
                optional: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: search
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: core-services
spec:
  selector:
    app: search
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search
  namespace: core-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: search
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
