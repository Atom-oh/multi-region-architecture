apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-catalog
  namespace: core-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::180294183052:role/production-dsql-access-us-east-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog
  namespace: core-services
  labels:
    app: product-catalog
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: product-catalog
  template:
    metadata:
      labels:
        app: product-catalog
        version: v1
    spec:
      serviceAccountName: product-catalog
      containers:
        - name: product-catalog
          image: 180294183052.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/product-catalog:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: REGION_ROLE
              value: PRIMARY
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.platform.svc.cluster.local:4317"
            # DB_HOST: DocumentDB endpoint via ExternalSecret
            # CACHE_HOST: Valkey endpoint via ExternalSecret (TTL: 15m)
            # KAFKA_BROKERS: MSK bootstrap via ExternalSecret
          envFrom:
            - secretRef:
                name: product-catalog-secrets
                optional: true
            - secretRef:
                name: documentdb-credentials
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: product-catalog
---
apiVersion: v1
kind: Service
metadata:
  name: product-catalog
  namespace: core-services
spec:
  selector:
    app: product-catalog
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-catalog
  namespace: core-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-catalog
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
