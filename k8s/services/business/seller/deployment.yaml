apiVersion: v1
kind: ServiceAccount
metadata:
  name: seller
  namespace: business-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/production-dsql-access-us-east-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller
  namespace: business-services
  labels:
    app: seller
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seller
  template:
    metadata:
      labels:
        app: seller
        version: v1
    spec:
      serviceAccountName: seller
      containers:
        - name: seller
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/seller:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: REGION_ROLE
              value: PRIMARY
            - name: OTEL_SERVICE_NAME
              value: "seller"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.platform.svc.cluster.local:4317"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            # DB_HOST: Aurora PostgreSQL endpoint via ExternalSecret
            # KAFKA_BROKERS: MSK bootstrap via ExternalSecret
          envFrom:
            - secretRef:
                name: seller-secrets
                optional: true
            - secretRef:
                name: aurora-credentials
                optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: seller
---
apiVersion: v1
kind: Service
metadata:
  name: seller
  namespace: business-services
spec:
  selector:
    app: seller
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seller
  namespace: business-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seller
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
