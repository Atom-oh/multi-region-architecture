apiVersion: batch/v1
kind: CronJob
metadata:
  name: synthetic-monitor
  namespace: platform
  labels:
    app: synthetic-monitor
    tier: platform
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 180
      template:
        metadata:
          labels:
            app: synthetic-monitor
            tier: platform
        spec:
          restartPolicy: Never
          containers:
            - name: synthetic-monitor
              image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/synthetic-monitor:latest
              imagePullPolicy: Always
              env:
                - name: BASE_URL
                  value: "https://mall.atomai.click"
                - name: OTEL_SERVICE_NAME
                  value: "synthetic-monitor"
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://tempo.observability.svc.cluster.local:4317"
                - name: ORIGIN_REGION
                  value: "us-east-1"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
