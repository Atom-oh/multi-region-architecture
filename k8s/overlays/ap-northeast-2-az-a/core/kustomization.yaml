apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../services/core

patches:
  - target:
      kind: Deployment
    patch: |-
      # All core service deployments have AWS_REGION at env[0] and
      # REGION_ROLE at env[1] in the base. Override values (not append)
      # to avoid duplicate-key errors in strict structured-merge clients
      # (ArgoCD ComparisonError "duplicate entries for key").
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "ap-northeast-2"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "SECONDARY"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AVAILABILITY_ZONE
          value: "ap-northeast-2a"
      - op: replace
        path: /spec/template/spec/topologySpreadConstraints/0/whenUnsatisfiable
        value: "ScheduleAnyway"
  # Pilot for ambient mesh zone failover: az-a's payment/order Services
  # become visible as remote endpoints to az-c (and vice versa via the
  # identical patch there), so an in-cluster payment/order outage fails
  # over to the other AZ's cluster instead of erroring. Everything else
  # in core stays cluster-local. Expand this list once the pilot is
  # validated (see k8s/infra/istio-eastwest/README.md).
  - target:
      kind: Service
      name: payment
    patch: |-
      # payment/order Services have no metadata.labels in the base, so the
      # whole map is added here rather than a nested key (JSON patch `add`
      # requires the parent object to already exist).
      - op: add
        path: /metadata/labels
        value:
          istio.io/global: "true"
  - target:
      kind: Service
      name: order
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          istio.io/global: "true"

commonLabels:
  region: ap-northeast-2
  region-role: secondary
  availability-zone: ap-northeast-2a
