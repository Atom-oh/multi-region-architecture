apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - core
  - user
  - fulfillment
  - business
  - platform
  # Observability shared agents (otel-collector, tempo) removed —
  # their bases have AWS_REGION env which conflicts with the top-level
  # 'op: add' env patch (duplicates), causing ArgoCD strict structured-merge
  # diff to fail. They should be deployed via a dedicated shared-agents path
  # that doesn't inherit the workload-targeted top-level patches.
  # Tempo is also being deprecated per AWS-Demo-Platform Stage 4 plan
  # (ClickHouse replaces it for traces).

namespace: ""

patches:
  - target:
      kind: TargetGroupBinding
      name: api-gateway-tgb
    patch: |-
      - op: replace
        path: /spec/targetGroupARN
        value: "arn:aws:elasticloadbalancing:ap-northeast-2:180294183052:targetgroup/prod-wtg-apne2-az-a/zzzzzzzzzzzzzzzz"
  - target:
      kind: Deployment
    patch: |-
      # Append per-region data store endpoints. Keys already provided
      # by per-domain overlays (AWS_REGION/REGION_ROLE/AVAILABILITY_ZONE/
      # OTEL_EXPORTER_OTLP_ENDPOINT) are NOT re-added here to avoid duplicates.
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_WRITE_HOST
          value: "production-aurora-global-ap-northeast-2.cluster-zzzzzzzzzzzz.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_READ_HOST_LOCAL
          value: "reader-2a.cluster-custom-zzzzzzzzzzzz.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DOCUMENTDB_HOST
          value: "production-docdb-ap-northeast-2-az-a.zzzzzzzzzzzz.ap-northeast-2.docdb.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DOCUMENTDB_WRITE_HOST
          value: "production-docdb-ap-northeast-2.cluster-zzzzzzzzzzzz.ap-northeast-2.docdb.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=production,aws.region=ap-northeast-2,availability_zone=ap-northeast-2a"
  - target:
      kind: Deployment
      name: cart
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CACHE_HOST
          value: "master.production-elasticache-ap-northeast-2.zzzzzz.apn2.cache.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CACHE_PORT
          value: "6379"

configMapGenerator:
  - name: region-config
    namespace: platform
    literals:
      - REGION=ap-northeast-2
      - REGION_ROLE=SECONDARY
      - AVAILABILITY_ZONE=ap-northeast-2a
      - AURORA_WRITER_ENDPOINT=production-aurora-global-ap-northeast-2.cluster-zzzzzzzzzzzz.ap-northeast-2.rds.amazonaws.com
      - AURORA_READER_LOCAL_ENDPOINT=reader-2a.cluster-custom-zzzzzzzzzzzz.ap-northeast-2.rds.amazonaws.com
      - DOCUMENTDB_READER_ENDPOINT=production-docdb-ap-northeast-2-az-a.zzzzzzzzzzzz.ap-northeast-2.docdb.amazonaws.com
      - DOCUMENTDB_WRITER_ENDPOINT=production-docdb-ap-northeast-2.cluster-zzzzzzzzzzzz.ap-northeast-2.docdb.amazonaws.com
      - VALKEY_ENDPOINT=master.production-elasticache-ap-northeast-2.zzzzzz.apn2.cache.amazonaws.com
      - MSK_BROKERS=b-2.productionmskapne2.zzzzzz.c3.kafka.ap-northeast-2.amazonaws.com:9096,b-3.productionmskapne2.zzzzzz.c3.kafka.ap-northeast-2.amazonaws.com:9096,b-4.productionmskapne2.zzzzzz.c3.kafka.ap-northeast-2.amazonaws.com:9096
      - OPENSEARCH_ENDPOINT=https://vpc-production-os-apne2-zzzzzzzzzzzzzzzzzzzzzzzzzz.ap-northeast-2.es.amazonaws.com
  - name: tempo-region-config
    namespace: observability
    literals:
      - TEMPO_S3_BUCKET=production-mall-tempo-traces-ap-northeast-2-az-a
      - TEMPO_ROLE_ARN=arn:aws:iam::180294183052:role/production-tempo-ap-northeast-2-az-a

commonLabels:
  region: ap-northeast-2
  region-role: secondary
  availability-zone: ap-northeast-2a

commonAnnotations:
  region.kubernetes.io/name: ap-northeast-2
  region.kubernetes.io/role: secondary
