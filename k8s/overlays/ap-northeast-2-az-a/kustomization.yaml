apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - core
  - user
  - fulfillment
  - business
  - platform
  # Observability shared agents (otel-collector, tempo) removed —
  # their bases have AWS_REGION env which conflicts with the top-level
  # 'op: add' env patch (duplicates), causing ArgoCD strict structured-merge
  # diff to fail. They should be deployed via a dedicated shared-agents path
  # that doesn't inherit the workload-targeted top-level patches.
  # Tempo is also being deprecated per AWS-Demo-Platform Stage 4 plan
  # (ClickHouse replaces it for traces).

namespace: ""

patches:
  # TGB targetGroupARN is patched in the platform overlay
  # (k8s/overlays/ap-northeast-2-az-a/platform/kustomization.yaml) with the
  # real hex ID (56b6d65d7ffe61ba). The duplicate top-level patch with
  # the `zzzzzzzzzzzzzzzz` placeholder was overriding that to an invalid ARN,
  # which the elbv2.k8s.aws admission webhook rejected on ArgoCD sync.
  - target:
      kind: Deployment
    patch: |-
      # Append per-region data store endpoints. Keys already provided
      # by per-domain overlays (AWS_REGION/REGION_ROLE/AVAILABILITY_ZONE/
      # OTEL_EXPORTER_OTLP_ENDPOINT) are NOT re-added here to avoid duplicates.
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_WRITE_HOST
          value: "production-aurora-global-ap-northeast-2.cluster-ch0io48c0dqx.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DB_READ_HOST_LOCAL
          value: "reader-2a.cluster-custom-ch0io48c0dqx.ap-northeast-2.rds.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DOCUMENTDB_HOST
          value: "production-docdb-global-ap-northeast-2-1.ch0io48c0dqx.ap-northeast-2.docdb.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: DOCUMENTDB_WRITE_HOST
          value: "production-docdb-global-ap-northeast-2.cluster-ch0io48c0dqx.ap-northeast-2.docdb.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=production,aws.region=ap-northeast-2,availability_zone=ap-northeast-2a"
  - target:
      kind: Deployment
      name: cart
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CACHE_HOST
          value: "master.production-elasticache-ap-northeast-2.wfdxww.apn2.cache.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CACHE_PORT
          value: "6379"
  # Opts every workload namespace into the ambient mesh (ztunnel picks up
  # pods here transparently, no sidecar/restart needed) so the Istio
  # ambient east-west gateway can provide zone failover between az-a/az-c.
  - target:
      kind: Namespace
    patch: |-
      - op: add
        path: /metadata/labels/istio.io~1dataplane-mode
        value: ambient

configMapGenerator:
  - name: region-config
    namespace: platform
    literals:
      - REGION=ap-northeast-2
      - REGION_ROLE=SECONDARY
      - AVAILABILITY_ZONE=ap-northeast-2a
      - AURORA_WRITER_ENDPOINT=production-aurora-global-ap-northeast-2.cluster-ch0io48c0dqx.ap-northeast-2.rds.amazonaws.com
      - AURORA_READER_LOCAL_ENDPOINT=reader-2a.cluster-custom-ch0io48c0dqx.ap-northeast-2.rds.amazonaws.com
      - DOCUMENTDB_READER_ENDPOINT=production-docdb-global-ap-northeast-2-1.ch0io48c0dqx.ap-northeast-2.docdb.amazonaws.com
      - DOCUMENTDB_WRITER_ENDPOINT=production-docdb-global-ap-northeast-2.cluster-ch0io48c0dqx.ap-northeast-2.docdb.amazonaws.com
      - VALKEY_ENDPOINT=master.production-elasticache-ap-northeast-2.wfdxww.apn2.cache.amazonaws.com
      - MSK_BROKERS=b-2.productionmskapno.v9ccd7.c3.kafka.ap-northeast-2.amazonaws.com:9096,b-3.productionmskapno.v9ccd7.c3.kafka.ap-northeast-2.amazonaws.com:9096,b-4.productionmskapno.v9ccd7.c3.kafka.ap-northeast-2.amazonaws.com:9096
      - OPENSEARCH_ENDPOINT=https://vpc-production-os-apne2-w3yhkzkr2hmskdngwdkqqe3vli.ap-northeast-2.es.amazonaws.com
  - name: tempo-region-config
    namespace: observability
    literals:
      - TEMPO_S3_BUCKET=production-mall-tempo-traces-ap-northeast-2-az-a
      - TEMPO_ROLE_ARN=arn:aws:iam::180294183052:role/production-tempo-ap-northeast-2-az-a

commonLabels:
  region: ap-northeast-2
  region-role: secondary
  availability-zone: ap-northeast-2a

commonAnnotations:
  region.kubernetes.io/name: ap-northeast-2
  region.kubernetes.io/role: secondary
