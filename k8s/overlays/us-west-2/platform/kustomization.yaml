apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../services/platform
  - ../../../services/platform/synthetic-monitor

patches:
  - target:
      kind: TargetGroupBinding
      name: api-gateway-tgb
    patch: |-
      - op: replace
        path: /spec/targetGroupARN
        value: "arn:aws:elasticloadbalancing:us-west-2:180294183052:targetgroup/production-api-tg-us-west-2/6e707c837e2a626c"
  - target:
      kind: CronJob
      name: synthetic-monitor
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: "180294183052.dkr.ecr.us-west-2.amazonaws.com/shopping-mall/synthetic-monitor:latest"
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/env/3
        value:
          name: ORIGIN_REGION
          value: "us-west-2"
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGION_ROLE
          value: "SECONDARY"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_REGION
          value: "us-west-2"

commonLabels:
  region: us-west-2
  region-role: secondary
