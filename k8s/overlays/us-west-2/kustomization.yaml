apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../services/core
  - ../../services/user
  - ../../services/fulfillment
  - ../../services/business
  - ../../services/platform
  - ../../infra/karpenter
  - ../../infra/otel-collector
  - ../../infra/tempo
  - ../../infra/argocd/argocd-server-nlb.yaml
  - ../../services/platform/synthetic-monitor


namespace: ""

patches:
  - target:
      kind: TargetGroupBinding
      name: api-gateway-tgb
    patch: |-
      - op: replace
        path: /spec/targetGroupARN
        value: "arn:aws:elasticloadbalancing:us-west-2:180294183052:targetgroup/production-api-tg-us-west-2/yyyyyyyyyyyyyyyy"
  - target:
      kind: Service
      name: argocd-server-nlb
      namespace: argocd
    patch: |-
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-security-groups
        value: "sg-0cccc33333ddddd44"
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-ssl-cert
        value: "arn:aws:acm:us-west-2:180294183052:certificate/yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy"
  - target:
      kind: CronJob
      name: synthetic-monitor
    patch: |-
      - op: replace
        path: /spec/jobTemplate/spec/template/spec/containers/0/image
        value: "180294183052.dkr.ecr.us-west-2.amazonaws.com/shopping-mall/synthetic-monitor:latest"
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGION_ROLE
          value: "SECONDARY"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_REGION
          value: "us-west-2"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.platform.svc.cluster.local:4317"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=production,aws.region=us-west-2"
  - target:
      kind: Deployment
      name: cart
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CACHE_HOST
          value: "clustercfg.production-elasticache-us-west-2.yyyyyy.usw2.cache.amazonaws.com"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CACHE_PORT
          value: "6379"

configMapGenerator:
  - name: region-config
    namespace: platform
    literals:
      - REGION=us-west-2
      - REGION_ROLE=SECONDARY
      - DSQL_ENDPOINT=<placeholder-until-apply>.us-west-2.dsql.amazonaws.com
      - DOCUMENTDB_ENDPOINT=production-docdb-global-us-west-2.cluster-yyyyyyyyyyyy.us-west-2.docdb.amazonaws.com
      - VALKEY_ENDPOINT=clustercfg.production-elasticache-us-west-2.yyyyyy.usw2.cache.amazonaws.com
      - MSK_BROKERS=b-1.productionmskuswest2.yyyyyy.yyy.kafka.us-west-2.amazonaws.com:9096,b-2.productionmskuswest2.yyyyyy.yyy.kafka.us-west-2.amazonaws.com:9096,b-3.productionmskuswest2.yyyyyy.yyy.kafka.us-west-2.amazonaws.com:9096
      - OPENSEARCH_ENDPOINT=https://vpc-production-os-usw2-yyyyyyyyyyyyyyyyyyyyyyyyyyyy.us-west-2.es.amazonaws.com
  - name: tempo-region-config
    namespace: observability
    literals:
      - TEMPO_S3_BUCKET=production-mall-tempo-traces-us-west-2
      - TEMPO_ROLE_ARN=arn:aws:iam::180294183052:role/production-tempo-us-west-2

commonLabels:
  region: us-west-2
  region-role: secondary

commonAnnotations:
  region.kubernetes.io/name: us-west-2
  region.kubernetes.io/role: secondary
