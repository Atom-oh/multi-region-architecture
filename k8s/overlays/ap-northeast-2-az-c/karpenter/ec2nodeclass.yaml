apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        deleteOnTermination: true
  role: mall-apne2-az-c-node-group
  subnetSelectorTerms:
    - tags:
        Tier: private
        topology.kubernetes.io/zone: ap-northeast-2c
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: mall-apne2-az-c
  tags:
    Environment: production
    ManagedBy: karpenter
