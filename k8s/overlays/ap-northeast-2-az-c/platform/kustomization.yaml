apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../services/platform

patches:
  - target:
      kind: TargetGroupBinding
      name: api-gateway-tgb
    patch: |-
      - op: replace
        path: /spec/targetGroupARN
        value: "arn:aws:elasticloadbalancing:ap-northeast-2:123456789012:targetgroup/prod-wtg-apne2-az-c/zzzzzzzzzzzzzzzz"
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: REGION_ROLE
          value: "SECONDARY"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_REGION
          value: "ap-northeast-2"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AVAILABILITY_ZONE
          value: "ap-northeast-2c"

commonLabels:
  region: ap-northeast-2
  region-role: secondary
  availability-zone: ap-northeast-2c
