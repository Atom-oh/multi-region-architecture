<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#232f3e"/>
      <stop offset="100%" style="stop-color:#37475a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Globe/region circles -->
  <circle cx="75" cy="100" r="35" fill="none" stroke="#ff9900" stroke-width="3"/>
  <circle cx="125" cy="100" r="35" fill="none" stroke="#ff9900" stroke-width="3"/>
  <!-- Connection arc -->
  <path d="M 95 75 Q 100 60 105 75" fill="none" stroke="#ff9900" stroke-width="2.5"/>
  <path d="M 95 125 Q 100 140 105 125" fill="none" stroke="#ff9900" stroke-width="2.5"/>
  <!-- Region labels -->
  <text x="75" y="105" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" font-family="sans-serif">E1</text>
  <text x="125" y="105" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold" font-family="sans-serif">W2</text>
  <!-- Data flow arrows -->
  <path d="M 95 90 L 105 90" stroke="#ff9900" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 105 110 L 95 110" stroke="#ff9900" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M 0 0 L 6 2 L 0 4 Z" fill="#ff9900"/>
    </marker>
  </defs>
  <!-- Bottom text -->
  <text x="100" y="165" text-anchor="middle" fill="#ff9900" font-size="14" font-weight="bold" font-family="sans-serif">MULTI-REGION</text>
</svg>
