spring:
  application:
    name: pricing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mall}?sslmode=require
    username: ${DB_USER:mall_admin}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 5000
  sql:
    init:
      mode: never
server:
  port: 8080
