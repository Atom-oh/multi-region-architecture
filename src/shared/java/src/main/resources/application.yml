region:
  role: ${REGION_ROLE:PRIMARY}
  aws-region: ${AWS_REGION:us-east-1}
  primary-host: ${PRIMARY_HOST:}
  availability-zone: ${AVAILABILITY_ZONE:}
  db-write-host: ${DB_WRITE_HOST:}
  db-read-host-local: ${DB_READ_HOST_LOCAL:}
  client-rack: ${CLIENT_RACK:}
  prefer-replica-az: ${PREFER_REPLICA_AZ:}
  kafka-brokers-local: ${KAFKA_BROKERS_LOCAL:}

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mall}
    username: ${DB_USER:mall}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${CACHE_HOST:localhost}
      port: ${CACHE_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"${spring.application.name}","trace_id":"%X{trace_id:-}","span_id":"%X{span_id:-}","message":"%m","logger":"%logger"}%n'
