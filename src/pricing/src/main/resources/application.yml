spring:
  application:
    name: pricing

region:
  role: ${REGION_ROLE:PRIMARY}
  aws-region: ${AWS_REGION:us-east-1}
  primary-host: ${PRIMARY_HOST:}

server:
  port: 8080

spring.datasource:
  url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pricing}
  username: ${DB_USER:mall}
  password: ${DB_PASSWORD:}
  hikari:
    maximum-pool-size: 20
    minimum-idle: 5

spring.jpa:
  hibernate:
    ddl-auto: validate
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect

spring.flyway:
  enabled: true
  locations: classpath:db/migration

spring.data.redis:
  host: ${CACHE_HOST:localhost}
  port: ${CACHE_PORT:6379}

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"pricing","trace_id":"%X{trace_id:-}","span_id":"%X{span_id:-}","message":"%m","logger":"%logger"}%n'
