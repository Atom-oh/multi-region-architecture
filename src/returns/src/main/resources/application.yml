spring:
  application:
    name: returns

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:returns}
    username: ${DB_USER:mall}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

logging:
  level:
    root: INFO
    com.mall.returns: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"${spring.application.name}","trace_id":"%X{trace_id:-}","span_id":"%X{span_id:-}","logger":"%logger","message":"%msg"}%n'

region:
  role: ${REGION_ROLE:PRIMARY}
  aws-region: ${AWS_REGION:us-east-1}
  primary-host: ${PRIMARY_HOST:}
