spring:
  application:
    name: user-account
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_account}
    username: ${DB_USER:mall}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${CACHE_HOST:localhost}
      port: ${CACHE_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080
  shutdown: graceful

region:
  role: ${REGION_ROLE:PRIMARY}
  aws-region: ${AWS_REGION:us-east-1}
  primary-host: ${PRIMARY_HOST:}

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}

logging:
  level:
    root: INFO
    com.mall: DEBUG
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"user-account","trace_id":"%X{trace_id:-}","span_id":"%X{span_id:-}","logger":"%logger","message":"%msg"}%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
