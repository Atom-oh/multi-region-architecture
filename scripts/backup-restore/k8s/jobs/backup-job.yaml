apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-restore
  namespace: core-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/mall-apne2-backup-restore
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mall-backup
  namespace: core-services
  labels:
    app: backup-restore
    component: data-backup
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: backup-restore
    spec:
      restartPolicy: Never
      serviceAccountName: backup-restore
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backup
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/shopping-mall/backup-restore:latest
          command: ["bash", "backup.sh"]
          env:
            - name: REGION_LABEL
              value: "ap-northeast-2"
            - name: AWS_REGION
              value: "ap-northeast-2"
            # Literal, not configMapKeyRef: kustomize's configMapGenerator
            # hash-suffixes "region-config"'s real name, so a fixed name here
            # would never resolve — this Job isn't part of that same build.
            - name: AURORA_ENDPOINT
              value: "production-aurora-global-ap-northeast-2.cluster-ch0io48c0dqx.ap-northeast-2.rds.amazonaws.com"
            - name: AURORA_USER
              value: "mall_admin"
            - name: AURORA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-secrets # ExternalSecret <- mall/core/aurora
                  key: DB_PASSWORD
            - name: DOCUMENTDB_HOST
              value: "production-docdb-global-ap-northeast-2.cluster-ch0io48c0dqx.ap-northeast-2.docdb.amazonaws.com"
            - name: DOCUMENTDB_USER
              valueFrom:
                secretKeyRef:
                  name: product-catalog-secrets
                  key: DB_USER
            - name: DOCUMENTDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-catalog-secrets
                  key: DB_PASSWORD
            - name: STATIC_ASSETS_BUCKET
              value: "production-mall-static-assets-ap-northeast-2"
            # Private bucket (terraform: shared/backups-bucket.tf) — NEVER the
            # static-assets bucket: that one is a CloudFront origin whose default
            # behavior serves backups/* publicly at https://mall.<domain>/backups/...
            - name: BACKUP_S3_BUCKET
              value: "production-mall-backups-ap-northeast-2"
            - name: BACKUP_S3_PREFIX
              value: "backups"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
