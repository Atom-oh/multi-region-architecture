apiVersion: v1
kind: ServiceAccount
metadata:
  name: seed-data
  namespace: core-services
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/production-dsql-access-us-east-1
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: core-services
  labels:
    app: seed-data
    component: data-initialization
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: seed-data
    spec:
      restartPolicy: Never
      serviceAccountName: seed-data
      containers:
        - name: seed-data
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/seed-data:latest
          command: ["bash", "run-seed.sh"]
          env:
            # Aurora DSQL (IAM auth — token generated at runtime via IRSA)
            # For DSQL: AURORA_USER/PASSWORD/DB are auto-set by run-seed.sh
            - name: AURORA_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: region-config
                  key: DSQL_ENDPOINT
                  optional: true
            # DocumentDB (secret keys: DOCUMENTDB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DOCUMENTDB_PORT)
            - name: DOCUMENTDB_URI
              value: ""
            - name: DOCUMENTDB_HOST
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DOCUMENTDB_HOST
                  optional: true
            - name: DOCUMENTDB_USER
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DB_USER
                  optional: true
            - name: DOCUMENTDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DB_PASSWORD
                  optional: true
            - name: DOCUMENTDB_DB
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DB_NAME
                  optional: true
            - name: TLS_CA_FILE
              value: "/tmp/global-bundle.pem"
            # OpenSearch
            - name: OPENSEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: endpoint
                  optional: true
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
                  optional: true
            - name: OPENSEARCH_PASS
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
                  optional: true
            # MSK
            - name: MSK_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: msk-credentials
                  key: bootstrap-servers
                  optional: true
            - name: KAFKA_HOME
              value: "/opt/kafka"
            # ElastiCache
            - name: ELASTICACHE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: elasticache-credentials
                  key: endpoint
                  optional: true
            - name: ELASTICACHE_PORT
              value: "6379"
            # Region (us-east-1 for DSQL primary + DocumentDB primary)
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
