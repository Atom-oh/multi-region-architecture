apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: platform
  labels:
    app: seed-data
    component: data-initialization
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: seed-data
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: seed-data
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/shopping-mall/seed-data:latest
          command: ["bash", "run-seed.sh"]
          env:
            # Aurora PostgreSQL
            - name: AURORA_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: endpoint
                  optional: true
            - name: AURORA_USER
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: username
                  optional: true
            - name: AURORA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: password
                  optional: true
            - name: AURORA_DB
              value: "mall"
            # DocumentDB
            - name: DOCUMENTDB_URI
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: uri
                  optional: true
            - name: TLS_CA_FILE
              value: "/tmp/global-bundle.pem"
            # OpenSearch
            - name: OPENSEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: endpoint
                  optional: true
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
                  optional: true
            - name: OPENSEARCH_PASS
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
                  optional: true
            # MSK
            - name: MSK_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: msk-credentials
                  key: bootstrap-servers
                  optional: true
            - name: KAFKA_HOME
              value: "/opt/kafka"
            # ElastiCache
            - name: ELASTICACHE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: elasticache-credentials
                  key: endpoint
                  optional: true
            - name: ELASTICACHE_PORT
              value: "6379"
            # Region
            - name: AWS_REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
