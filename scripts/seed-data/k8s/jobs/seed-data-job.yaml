apiVersion: batch/v1
kind: Job
metadata:
  name: seed-data
  namespace: core-services
  labels:
    app: seed-data
    component: data-initialization
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: seed-data
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: seed-data
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/shopping-mall/seed-data:latest
          command: ["bash", "run-seed.sh"]
          env:
            # Aurora PostgreSQL (secret keys: DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DB_PORT)
            - name: AURORA_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: DB_HOST
                  optional: true
            - name: AURORA_USER
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: DB_USER
                  optional: true
            - name: AURORA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: DB_PASSWORD
                  optional: true
            - name: AURORA_DB
              valueFrom:
                secretKeyRef:
                  name: aurora-credentials
                  key: DB_NAME
                  optional: true
            # DocumentDB (secret keys: DOCUMENTDB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DOCUMENTDB_PORT)
            - name: DOCUMENTDB_URI
              value: ""
            - name: DOCUMENTDB_HOST
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DOCUMENTDB_HOST
                  optional: true
            - name: DOCUMENTDB_USER
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DB_USER
                  optional: true
            - name: DOCUMENTDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DB_PASSWORD
                  optional: true
            - name: DOCUMENTDB_DB
              valueFrom:
                secretKeyRef:
                  name: documentdb-credentials
                  key: DB_NAME
                  optional: true
            - name: TLS_CA_FILE
              value: "/tmp/global-bundle.pem"
            # OpenSearch
            - name: OPENSEARCH_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: endpoint
                  optional: true
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
                  optional: true
            - name: OPENSEARCH_PASS
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
                  optional: true
            # MSK
            - name: MSK_BOOTSTRAP
              valueFrom:
                secretKeyRef:
                  name: msk-credentials
                  key: bootstrap-servers
                  optional: true
            - name: KAFKA_HOME
              value: "/opt/kafka"
            # ElastiCache
            - name: ELASTICACHE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: elasticache-credentials
                  key: endpoint
                  optional: true
            - name: ELASTICACHE_PORT
              value: "6379"
            # Region
            - name: AWS_REGION
              value: "ap-northeast-2"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
