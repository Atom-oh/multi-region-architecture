name: Build Seed Data Image

on:
  push:
    branches: [main]
    paths: ['scripts/seed-data/**', '.github/workflows/seed-data.yml']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  IMAGE_NAME: shopping-mall/seed-data

jobs:
  build-and-push:
    runs-on: self-hosted-x86
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" scripts/seed-data/
          docker push "$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          docker tag "$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" "$ECR_REGISTRY/$IMAGE_NAME:latest"
          docker push "$ECR_REGISTRY/$IMAGE_NAME:latest"
          echo "✅ Image pushed: $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          echo ""
          echo "To run seed job on a cluster:"
          echo "  kubectl delete job seed-data -n platform --ignore-not-found"
          echo "  kubectl apply -f scripts/seed-data/k8s/jobs/seed-data-job.yaml"
          echo "  kubectl logs -f job/seed-data -n platform"
