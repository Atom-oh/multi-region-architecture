name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    branches: [main]
    paths: ['terraform/**']

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.7.0'
  AWS_PRIMARY_REGION: 'us-east-1'
  AWS_SECONDARY_REGION: 'us-west-2'

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive terraform/

    - name: Install tflint
      uses: terraform-linters/setup-tflint@v4

    - name: Run tflint
      run: |
        cd terraform
        tflint --recursive

    - name: Install Checkov
      run: pip install checkov

    - name: Run Checkov Security Scan
      run: |
        checkov -d terraform/ \
          --framework terraform \
          --output github_failed_only \
          --soft-fail

    - name: Validate Global Modules
      run: |
        for dir in terraform/global/*/; do
          echo "Validating $dir"
          cd "$dir"
          terraform init -backend=false
          terraform validate
          cd -
        done

    - name: Validate Reusable Modules
      run: |
        for dir in terraform/modules/*/*/; do
          echo "Validating $dir"
          cd "$dir"
          terraform init -backend=false
          terraform validate
          cd -
        done

  plan-primary:
    name: Plan Primary (us-east-1)
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_PRIMARY_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/production/us-east-1
      run: terraform init

    - name: Terraform Plan
      working-directory: terraform/environments/production/us-east-1
      id: plan-east
      run: |
        terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
      continue-on-error: true

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-us-east-1
        path: terraform/environments/production/us-east-1/tfplan

    - name: Comment PR with Plan
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('terraform/environments/production/us-east-1/plan-output.txt', 'utf8');
          const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Terraform Plan - us-east-1 (Primary)\n\n<details><summary>Show Plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`
          });

  plan-secondary:
    name: Plan Secondary (us-west-2)
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_SECONDARY_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/production/us-west-2
      run: terraform init

    - name: Terraform Plan
      working-directory: terraform/environments/production/us-west-2
      run: |
        terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
      continue-on-error: true

    - name: Upload Plan
      uses: actions/upload-artifact@v4
      with:
        name: tfplan-us-west-2
        path: terraform/environments/production/us-west-2/tfplan

    - name: Comment PR with Plan
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('terraform/environments/production/us-west-2/plan-output.txt', 'utf8');
          const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Terraform Plan - us-west-2 (Secondary)\n\n<details><summary>Show Plan</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`
          });

  apply-primary:
    name: Apply Primary (us-east-1)
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production-us-east-1
    steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_PRIMARY_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/production/us-east-1
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform/environments/production/us-east-1
      run: terraform apply -auto-approve

  apply-secondary:
    name: Apply Secondary (us-west-2)
    needs: apply-primary
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production-us-west-2
    steps:
    - uses: actions/checkout@v4
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_SECONDARY_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/production/us-west-2
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform/environments/production/us-west-2
      run: terraform apply -auto-approve
